<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG API Test Console</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --muted: #8b949e;
      --text: #e6edf3;
      --ok: #238636;
      --warn: #9e6a03;
      --err: #da3633;
      --line: #30363d;
      --accent: #2f81f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #1f2a3a 0%, var(--bg) 42%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
    }

    h1, h2 {
      margin: 0 0 10px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 5px;
    }

    input, textarea, button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0b0f14;
      color: var(--text);
      padding: 9px 10px;
      font-size: 14px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
      font-family: Consolas, monospace;
    }

    .row {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      margin-top: 8px;
    }

    button {
      cursor: pointer;
      background: #1f6feb;
      border-color: #1f6feb;
      font-weight: 600;
    }

    button.secondary {
      background: #21262d;
      border-color: #30363d;
    }

    button.warn {
      background: #9e6a03;
      border-color: #9e6a03;
    }

    .state {
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      background: #0b0f14;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .log {
      height: 300px;
      overflow: auto;
      background: #0b0f14;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .ok { color: #3fb950; }
    .warnText { color: #d29922; }
    .err { color: #ff7b72; }

    @media (max-width: 680px) {
      body { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>RAG API Test Console</h1>
      <div class="sub">Flow: Login -> Create Chatbot -> Add Source -> Start Ingestion -> Wait Complete -> Bootstrap -> Public Chat</div>
      <div class="grid">
        <div>
          <label>API Base URL</label>
          <input id="baseUrl" value="http://localhost:3001/api" />
        </div>
        <div>
          <label>Origin for Public Chat</label>
          <input id="origin" value="http://localhost:3001" />
        </div>
        <div>
          <label>Visitor ID</label>
          <input id="visitorId" value="test-visitor-001" />
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>1) Login</h2>
      <div class="grid">
        <div>
          <label>Username</label>
          <input id="username" placeholder="your username" />
        </div>
        <div>
          <label>Password</label>
          <input id="password" type="password" placeholder="your password" />
        </div>
      </div>
      <div class="row">
        <button id="loginBtn">Login</button>
      </div>
    </div>

    <div class="panel">
      <h2>2) Train</h2>
      <div class="grid">
        <div>
          <label>Chatbot Name</label>
          <input id="chatbotName" value="RAG Test Bot" />
        </div>
        <div>
          <label>Source Title</label>
          <input id="sourceTitle" value="Test Knowledge" />
        </div>
      </div>
      <label>Source Text (TEXT source)</label>
      <textarea id="sourceText">Node RAG System uses Pinecone for retrieval and Groq for answer generation. Public chat uses chatbot publicKey. To ingest source content, create a source and then trigger ingestion. The status becomes COMPLETED when chunks are indexed.</textarea>
      <div class="row">
        <button id="createBotBtn" class="secondary">Create Chatbot</button>
        <button id="addSourceBtn" class="secondary">Add Source</button>
        <button id="startIngestBtn" class="secondary">Start Ingestion</button>
        <button id="checkJobBtn" class="secondary">Check Latest Job</button>
      </div>
    </div>

    <div class="panel">
      <h2>3) Public Chat</h2>
      <label>Question</label>
      <textarea id="question">Which services are used for retrieval and response generation in this system?</textarea>
      <div class="row">
        <button id="bootstrapBtn" class="secondary">Bootstrap</button>
        <button id="chatBtn" class="secondary">Chat</button>
        <button id="runAllBtn" class="warn">Run Full Flow</button>
      </div>
    </div>

    <div class="panel">
      <h2>Runtime State</h2>
      <div id="state" class="state"></div>
    </div>

    <div class="panel">
      <h2>Logs</h2>
      <div id="log" class="log"></div>
      <div class="row">
        <button id="clearLogBtn" class="secondary">Clear Log</button>
      </div>
    </div>
  </div>

  <script src="/rag-test.js"></script>
</body>
</html>
